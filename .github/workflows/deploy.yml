name: Docker CI/CD
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  LOCAL_IMAGE_NAME: url-shortener
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPOSITORY || github.event.repository.name }}

jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar Docker no runner
        run: docker version

      - name: Build da imagem
        run: |
          docker build \
            --file Dockerfile \
            --tag "$LOCAL_IMAGE_NAME:${GITHUB_SHA}" \
            .

      - name: Exportar imagem como artefato
        run: |
          mkdir -p /tmp/url-shortener-artifact
          docker save "$LOCAL_IMAGE_NAME:${GITHUB_SHA}" | gzip > /tmp/url-shortener-artifact/image.tar.gz

      - name: Upload do artefato da imagem
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/url-shortener-artifact/image.tar.gz
          retention-days: 1

  push:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Download do artefato da imagem
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/url-shortener-artifact

      - name: Importar imagem no Docker
        run: docker load --input /tmp/url-shortener-artifact/image.tar.gz

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Criar tags da imagem
        run: |
          docker tag "$LOCAL_IMAGE_NAME:${GITHUB_SHA}" "$IMAGE_NAME:${GITHUB_SHA}"
          docker tag "$LOCAL_IMAGE_NAME:${GITHUB_SHA}" "$IMAGE_NAME:latest"

      - name: Push para o Docker Hub
        run: |
          docker push "$IMAGE_NAME:${GITHUB_SHA}"
          docker push "$IMAGE_NAME:latest"

